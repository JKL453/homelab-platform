---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: dist

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - htop
      - vim
      - ufw
      - ca-certificates
      - gnupg
    state: present

- name: Ensure SSH service is running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true